# .github/workflows/ci-node.yml
# Node.js team – calls the shared Snyk SAST reusable workflow

name: CI – Node.js

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Your existing build / test jobs go here
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test

  # ── Snyk SAST – reusable call ──────────────────────────────────────────────
  security-scan:
    name: Security – Snyk SAST
    needs: build                      # run after build succeeds
    uses: CD20012001/snyk-security-workflows/.github/workflows/snyk-sast-reusable.yml@main
    with:
      language: "node"
      severity-filter: "critical,high"
      fail-on-exploit: true
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
